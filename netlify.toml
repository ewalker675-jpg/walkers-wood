[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redirect /firewood to /firewood.html etc for clean URLs
[[redirects]]
  from = "/firewood"
  to = "/firewood.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/about-us"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/faqs"
  to = "/faqs.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/cookie-policy"
  to = "/cookie-policy.html"
  status = 200

[[redirects]]
  from = "/terms-and-conditions"
  to = "/terms-and-conditions.html"
  status = 200

[[redirects]]
  from = "/terms-of-use"
  to = "/terms-of-use.html"
  status = 200

# Local SEO landing page redirects
[[redirects]]
  from = "/firewood-delivery-worcester"
  to = "/firewood-delivery-worcester.html"
  status = 200

[[redirects]]
  from = "/seasoned-hardwood-logs"
  to = "/seasoned-hardwood-logs.html"
  status = 200

[[redirects]]
  from = "/wholesale-commercial-logs"
  to = "/wholesale-commercial-logs.html"
  status = 200

# Old Wix URL redirects
[[redirects]]
  from = "/firewood-1"
  to = "/firewood.html"
  status = 301

[[redirects]]
  from = "/fire-wood"
  to = "/firewood.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
